# SECURITY reusable workflow – AquaSec Scan to Issues.

name: AquaSec Scan

on:
  workflow_call:
    inputs:
      dry-run:
        description: >
          Simulate the workflow without making any persistent changes.
          Issue creation, updates, labelling, sub-issue linking, and Teams notifications are
          skipped; all actions that would have been taken are logged in the workflow output instead.
        required: false
        type: boolean
        default: false

      verbose-logging:
        description: 'Enable verbose logging'
        required: false
        type: boolean
        default: false

      severity-priority-map:
        description: >
          Comma-separated severity=priority pairs that map alert severities to
          priority values on the GitHub Project (e.g.'Critical=Blocker,High=Urgent,Medium=Normal').
          Only listed severities get a priority. Unlisted ones are left empty. When not set, priority
          is skipped entirely.
        required: false
        type: string
        default: ''

      project-number:
        description: >
          GitHub Projects V2 number (org-level) where a Priority single-select
          field will be set for each promoted issue. Required together with
          severity-priority-map. When omitted, project-level priority is skipped.
        required: false
        type: number
        default: 0

      project-org:
        description: >
          GitHub organisation that owns the Projects V2 board. Use when the
          project lives in a different org than the scanned repo. When omitted,
          the org is derived from the repo name.
        required: false
        type: string
        default: ''

      min-severity:
        description: >
          Minimum severity level for issue creation. Accepted values: low, medium, high, critical
          (case-insensitive). Findings below this threshold are still fetched and still drive
          the closure lifecycle for previously created issues, but will not create or reopen
          issues. Defaults to 'low', which creates issues for all findings.
        required: false
        type: string
        default: 'low'

    secrets:
      AQUA_KEY:
        required: true
      AQUA_SECRET:
        required: true
      AQUA_GROUP_ID:
        required: true
      AQUA_REPOSITORY_ID:
        required: true
      TEAMS_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  aquasec-scan-to-issues:
    name: AquaSec Scan to Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: AbsaOSS/organizational-workflows
          ref: ${{ job.workflow_sha }}
          path: org-workflows
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: org-workflows/requirements.txt

      - name: Install dependencies
        run: pip install -r org-workflows/requirements.txt

      - name: Create issues from security alerts
        env:
          PYTHONPATH: org-workflows/src
          GH_TOKEN: ${{ github.token }}
          AQUA_KEY: ${{ secrets.AQUA_KEY }}
          AQUA_SECRET: ${{ secrets.AQUA_SECRET }}
          AQUA_GROUP_ID: ${{ secrets.AQUA_GROUP_ID }}
          AQUA_REPOSITORY_ID: ${{ secrets.AQUA_REPOSITORY_ID }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SEVERITY_PRIORITY_MAP: ${{ inputs.severity-priority-map }}
          PROJECT_NUMBER: ${{ inputs.project-number }}
          PROJECT_ORG: ${{ inputs.project-org }}
          MIN_SEVERITY: ${{ inputs.min-severity }}
        run: |
          python3 org-workflows/src/security/main.py \
            --scan-output aquasec_scan.json \
            ${{ inputs.dry-run && '--dry-run' || '' }} \
            ${{ inputs.verbose-logging && '--verbose' || '' }}

      - name: Upload scan findings artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aquasec-night-scan
          path: aquasec_scan.json
