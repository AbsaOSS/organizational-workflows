# SECURITY reusable workflow – AquaSec Scan + Security Alerts to Issues.

name: AquaSec Scan

on:
  workflow_call:
    inputs:
      verbose-logging:
        description: 'Enable verbose logging for AquaSec scan'
        required: false
        type: boolean
        default: false

      severity-priority-map:
        description: >
          Comma-separated severity=priority pairs that map alert severities to
          priority values on the GitHub Project (e.g.'Critical=Blocker,High=Urgent,Medium=Normal').
          Only listed severities get a priority. Unlisted ones are left empty. When not set, priority
          is skipped entirely.
        required: false
        type: string
        default: ''

      project-number:
        description: >
          GitHub Projects V2 number (org-level) where a Priority single-select
          field will be set for each promoted issue. Required together with
          severity-priority-map. When omitted, project-level priority is skipped.
        required: false
        type: number
        default: 0

      project-org:
        description: >
          GitHub organisation that owns the Projects V2 board. Use when the
          project lives in a different org than the scanned repo. When omitted,
          the org is derived from the repo name.
        required: false
        type: string
        default: ''

    secrets:
      AQUA_KEY:
        required: true
      AQUA_SECRET:
        required: true
      AQUA_GROUP_ID:
        required: true
      AQUA_REPOSITORY_ID:
        required: true
      TEAMS_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  actions: read
  issues: write
  security-events: write

jobs:
  aquasec-scan:
    name: AquaSec Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch AquaSec Scan Results
        id: aquasec
        uses: AbsaOSS/aquasec-scan-results@15ee405515a000288b4ae9cdcb9943ea974f74b7
        with:
          aqua-key: ${{ secrets.AQUA_KEY }}
          aqua-secret: ${{ secrets.AQUA_SECRET }}
          group-id: ${{ secrets.AQUA_GROUP_ID }}
          repository-id: ${{ secrets.AQUA_REPOSITORY_ID }}
          verbose-logging: ${{ inputs.verbose-logging }}

      - name: Upload scan results to GitHub Security and quality
        uses: github/codeql-action/upload-sarif@0b7b740d4cd9b44f80c907b666497564df09d1d9
        with:
          sarif_file: ${{ steps.aquasec.outputs.nightscan-sarif-file }}
          category: aquasec

  sync-alerts-to-issues:
    name: Security Alerts to Issues
    needs: aquasec-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: AbsaOSS/organizational-workflows
          ref: master
          path: org-workflows
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: org-workflows/requirements.txt

      - name: Install dependencies
        run: pip install -r org-workflows/requirements.txt

      - name: Create issues from security alerts
        env:
          PYTHONPATH: org-workflows/src
          GH_TOKEN: ${{ github.token }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SEVERITY_PRIORITY_MAP: ${{ inputs.severity-priority-map }}
          PROJECT_NUMBER: ${{ inputs.project-number }}
          PROJECT_ORG: ${{ inputs.project-org }}
        run: |
          python3 org-workflows/src/security/main.py
