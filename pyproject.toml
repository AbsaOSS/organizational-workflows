[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = ["--import-mode=importlib"]

[tool.black]
line-length = 120
target-version = ['py314']
force-exclude = '''test'''

[tool.coverage.run]
omit = [
    "tests/*",
    "src/security/derive_team_security_metrics.py",
    "src/security/extract_team_security_stats.py",
]

[tool.mypy]
check_untyped_defs = true
exclude = "tests"
